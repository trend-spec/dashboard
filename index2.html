<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
    
       .sidebar{
        height: 100vh;
       }
       
        table, th, td{

            border:1px solid gray;
            padding:10px;
        }
      
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
           <div class="col-2 sidebar text-white bg-dark p-3">
            <h1>Dashboard</h1>

   <p>Home</p>
   <p>Students</p>
   <p>Courses</p>
   <p>Exams</p>
   <p>Settings</p>

            </div>

            <div class="col-10 main">

                    <div class="row mt-4">
                         
                        <div class="col-md-3">
                             <div class="p-3 rounded  bg-danger text-white" >
                                <h5>Students</h5>
                                 <h2>1200</h2>
                               

                            </div>
                           </div>
                        <div class="col-md-3">
                             <div class="p-3 rounded  bg-primary text-white" >
                                <h5>Courses</h5>
                                 <h2>35</h2>
                               

                            </div>
                           </div>
                        <div class="col-md-3">
                             <div class="p-3 rounded  bg-warning text-white" >
                                <h5>Active Status</h5>
                                 <h2>1100</h2>
                               

                            </div>
                           </div>
                        <div class="col-md-3">
                             <div class="p-3 rounded  bg-success text-white" >
                                <h5>Revenue</h5>
                                 <h2>RS.200000</h2>
                               

                            </div>
                           </div>
                       

                    </div>
                <table class="mt-5">
                    <tr>
                        <th>ID</th>
                    <th>Name</th>
                    <th>Course</th>
                    <th>Status</th>

                </tr>
                <tr>

                </tr>
                <tr>
                    <td>101</td>

                    <td>Active</td>
                </tr>
                <tr>
                    <td>101</td>
                    <td>Rahul</td>
                    <td>Web Development</td>
                    <td>Active</td>
                </tr>

                </table>


            </div>


    </div>


</div>


    
</body>
</html>
